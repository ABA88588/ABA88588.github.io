        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #f25c27; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #e04a17; }

        .section-title {
            font-size: 32px; color: #f25c27; text-align: center;
            margin-bottom: 40px; padding-bottom: 12px;
            position: relative; display: inline-block;
            margin-left: 50%; transform: translateX(-50%); font-weight: 700;
        }
        .section-title::after {
            content: ""; position: absolute; bottom: 0; left: 10%; width: 80%;
            height: 3px; background: linear-gradient(90deg, transparent, #f25c27, transparent);
            border-radius: 3px;

        /* 顶部栏 */

        .top-left span i { font-size: 18px; color: #fff8f5; }
        .lang-switch { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .lang-btn {
            padding: 8px 16px; border: none; border-radius: 6px;
            background-color: rgba(255,255,255,0.2); color: white;
            cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s;
        }
        .lang-btn:hover { background-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .lang-btn.active { background-color: white; color: #f25c27; font-weight: 600; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }

        /* 导航 */
        .header {

            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 99;

        .header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 26px; color: #f25c27; font-weight: 800; }

        .nav-link:hover { color: white; background-color: #f25c27; box-shadow: 0 4px 12px rgba(242,92,39,0.3); }

        /* Banner 自动轮播 */
        .banner-section { width: 100%; overflow: hidden; margin-bottom: 10px; }
        .banner-track { display: flex; width: max-content; animation: bannerScroll 25s linear infinite; }
        .banner-track:hover { animation-play-state: paused; }
        .banner-img { width: 100vw; height: 420px; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        @keyframes bannerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 优势栏 */
        .advantage-bar { background: white; padding: 35px 0; box-shadow: 0 5px 20px rgba(0,0,0,0.04); margin: 20px 0; }
        .advantage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .advantage-item { text-align: center; padding: 20px; border-radius: 12px; transition: all 0.3s; }
        .advantage-item:hover { background: #fff5f2; transform: translateY(-4px); }
        .advantage-item i { font-size: 36px; color: #f25c27; margin-bottom: 12px; display: block; }
        .advantage-item h3 { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 6px; }
        .advantage-item p { font-size: 14px; color: #666; }

        /* 通用区块 */
        .gallery-section { padding: 70px 0; margin: 20px 0; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
        .gallery-section.white { background-color: white; }
        .gallery-section.grey { background-color: #f8f8f8; }

        /* 横向滚动容器 */
        .scroll-track {
            width: 100%; overflow-x: auto; overflow-y: hidden;
            padding: 10px 20px 25px;
            scrollbar-width: thin; scrollbar-color: #f25c27 #f1f1f1;
            cursor: grab; user-select: none;
        }
        .scroll-track:active { cursor: grabbing; }

        /* 工厂车间 自动滚动 */
        .auto-scroll-outer { width: 100%; overflow: hidden; padding: 10px 0 25px; }
        .gongchang-grid {
            display: flex;
            gap: 18px;
            width: max-content;
            animation: autoScrollLeft 35s linear infinite;
        }
        .auto-scroll-outer:hover .gongchang-grid { animation-play-state: paused; }
        .gongchang-item {
            width: 360px;
            background: white; border-radius: 12px; overflow: hidden;

        .gongchang-item:hover { transform: translateY(-6px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
        .gongchang-img { width: 100%; height: 210px; object-fit: cover; display: block; }

        /* 展厅手动滚动 */
        .zhanting-outer {
            width: 100%; overflow-x: auto; overflow-y: hidden;
            padding: 10px 20px 25px;
            scrollbar-width: thin; scrollbar-color: #f25c27 #f1f1f1;
            cursor: grab; user-select: none;
        }
        .zhanting-outer:active { cursor: grabbing; }
        .zhanting-list {

        }
        .zhanting-item {
            width: 380px; flex-shrink: 0;
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer;

        .zhanting-img { width: 100%; height: 260px; object-fit: cover; display: block; }

        @keyframes autoScrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }

        /* 灯箱 */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0;

            z-index: 9999; justify-content: center; align-items: center;

        .copyright { text-align: center; margin-top: 50px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.2); font-size: 14px; color: #fff8f5; }

        .whatsapp-float { position: fixed; bottom: 40px; right: 40px; z-index: 998; }

        .social-float { position: fixed; bottom: 40px; left: 40px; z-index: 998; display: flex; flex-direction: column; gap: 12px; }

        .social-douyin { background: linear-gradient(135deg, #fe2c55 0%, #e8244a 100%); }
        .social-threads { background: linear-gradient(135deg, #000 0%, #333 100%); }

        @media (max-width: 768px) {
            .section-title { font-size: 24px; margin-bottom: 25px; }
            .banner-img { height: 220px; }
            .advantage-grid { grid-template-columns: repeat(2, 1fr); }
            .gallery-section { padding: 50px 0; }
            .gongchang-grid { grid-auto-columns: 280px; }
            .gongchang-img { height: 160px; }
            .zhanting-item { width: 280px; }
            .zhanting-img { height: 180px; }
            .footer .container { grid-template-columns: 1fr; gap: 30px; }
            .footer { padding: 60px 0 20px; }

            .whatsapp-float { bottom: 25px; right: 25px; }

</head>

    const translateEls = document.querySelectorAll('.translate');
    const placeholderEls = document.querySelectorAll('.translate-placeholder');

    langBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            langBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const lang = btn.dataset.lang;
            translateEls.forEach(el => { if(el.dataset[lang]) el.innerHTML = el.dataset[lang]; });
            placeholderEls.forEach(el => { if(el.dataset[lang]) el.placeholder = el.dataset[lang]; });
            document.documentElement.lang = lang;
        });
    });

    // 灯箱
    function openLightbox(src) {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });

    // 鼠标拖动滚动
    ['gongchangOuter', 'zhantingOuter'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        let isDown = false, startX, scrollLeft;
        el.addEventListener('mousedown', e => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; });
        el.addEventListener('mouseleave', () => isDown = false);
        el.addEventListener('mouseup', () => isDown = false);
        el.addEventListener('mousemove', e => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - el.offsetLeft;
            el.scrollLeft = scrollLeft - (x - startX) * 1.5;
        });
    });
